name: Auto Merge best_ips + ubest_ips
on:
  push:
    branches: [ main ]
    paths:
      - best_ips.txt
      - ubest_ips.txt

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Merge and deduplicate IPs
        run: |
          cat best_ips.txt ubest_ips.txt | sort -u | grep -v '^$' > final_ips.txt

      - name: Commit & Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "✅ Auto merged IPs (best + ubest)"
          add: "final_ips.txt"
 
